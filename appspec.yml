version: 0.0
os: linux
files:
  - source: /
    destination: /var/www/html/
hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 200
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 200
      runas: root
  ApplicationStart:
    - location: scripts/start.sh
      timeout: 200
      runas: root
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 200
      runas: root